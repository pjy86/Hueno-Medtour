services:
  - type: web
    name: hntravel
    env: node
    region: oregon
    plan: starter
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: hntravel-db
          property: connectionString
      - key: NEXTAUTH_SECRET
        generateValue: true

databases:
  - name: hntravel-db
    plan: starter
    databaseName: hntravel
    ipAllowList: []
